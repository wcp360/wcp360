# ======================================================================
# WCP 360 | V0.1.0 | .github/workflows/ci.yml
# ======================================================================

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Go ${{ matrix.go }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go: ["1.22"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go ${{ matrix.go }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          skip-cache: false

      - name: go test (race detector)
        run: go test -race -count=1 -timeout=120s -coverprofile=coverage.out ./...

      - name: Coverage report
        run: go tool cover -html=coverage.out -o coverage.html

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.html
          retention-days: 7

  build:
    name: Build binary
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: go mod tidy check
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum || \
            (echo "go.mod/go.sum not tidy — run 'make tidy'" && exit 1)

      - name: Build
        run: |
          CGO_ENABLED=0 GOOS=linux go build \
            -ldflags="-s -w" \
            -o build/wcp360 ./cmd/wcp360
          echo "Binary size: $(du -sh build/wcp360 | cut -f1)"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: wcp360-linux-amd64
          path: build/wcp360
          retention-days: 7
