{{define "page"}}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Login — WCP360</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700&family=DM+Sans:wght@400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#050A14;--surface:#0A1628;--border:#1A2E52;--text:#B8CCEB;--muted:#4F6488;--accent:#4EFFC5;--danger:#FF5D73}
    body{background:var(--bg);color:var(--text);font-family:'DM Sans',system-ui,sans-serif;
      min-height:100vh;display:flex;align-items:center;justify-content:center;
      background-image:linear-gradient(rgba(78,255,197,.018) 1px,transparent 1px),linear-gradient(90deg,rgba(78,255,197,.018) 1px,transparent 1px);
      background-size:44px 44px}
    body::before,body::after{content:'';position:fixed;width:180px;height:180px;border:1px solid rgba(78,255,197,.1);pointer-events:none}
    body::before{top:24px;left:24px;border-right:none;border-bottom:none}
    body::after{bottom:24px;right:24px;border-left:none;border-top:none}
    .login-wrap{width:100%;max-width:380px;padding:20px;animation:rise .35s ease}
    @keyframes rise{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    .login-logo{text-align:center;margin-bottom:28px}
    .logo-hex{display:block;font-size:2.8rem;color:var(--accent);text-shadow:0 0 20px var(--accent);
      margin-bottom:6px;animation:glow-pulse 3s ease-in-out infinite}
    @keyframes glow-pulse{0%,100%{text-shadow:0 0 10px var(--accent)}50%{text-shadow:0 0 28px var(--accent),0 0 48px rgba(78,255,197,.3)}}
    .logo-name{font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:700;letter-spacing:.04em;color:var(--text)}
    .logo-sub{font-size:.75rem;color:var(--muted);font-family:'DM Mono',monospace;margin-top:2px}
    .login-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;
      padding:32px 28px;position:relative;overflow:hidden}
    .login-card::before{content:'';position:absolute;top:0;left:10%;right:10%;height:1px;
      background:linear-gradient(90deg,transparent,var(--accent),transparent)}
    .login-title{font-family:'Syne',sans-serif;font-size:1.15rem;font-weight:600;margin-bottom:4px}
    .login-desc{font-size:.82rem;color:var(--muted);margin-bottom:24px;font-family:'DM Mono',monospace}
    .alert-error{background:rgba(255,93,115,.08);border:1px solid rgba(255,93,115,.25);color:var(--danger);
      padding:10px 14px;border-radius:6px;font-size:.84rem;margin-bottom:18px;display:flex;align-items:center;gap:8px}
    .alert-error::before{content:'⚠';font-size:.9em}
    .field{margin-bottom:14px}
    .field label{display:block;font-size:.7rem;text-transform:uppercase;letter-spacing:.1em;
      color:var(--muted);margin-bottom:6px;font-family:'DM Mono',monospace}
    .field input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:7px;
      padding:10px 14px;color:var(--text);font-size:.9rem;font-family:'DM Mono',monospace;
      outline:none;transition:border-color .15s,box-shadow .15s}
    .field input:focus{border-color:rgba(78,255,197,.45);box-shadow:0 0 0 3px rgba(78,255,197,.07)}
    .btn-submit{width:100%;background:var(--accent);color:#050A14;border:none;border-radius:7px;
      padding:11px;font-size:.92rem;font-weight:600;font-family:'DM Sans',sans-serif;
      cursor:pointer;margin-top:20px;transition:all .15s;letter-spacing:.01em}
    .btn-submit:hover{background:#3de6b0;transform:translateY(-1px);box-shadow:0 4px 20px rgba(78,255,197,.2)}
    .login-version{text-align:center;margin-top:22px;font-size:.72rem;color:var(--muted);font-family:'DM Mono',monospace}
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-logo">
      <span class="logo-hex">⬡</span>
      <div class="logo-name">WCP360</div>
      <div class="logo-sub">Modern Web Control Panel</div>
    </div>
    <div class="login-card">
      <h1 class="login-title">Admin Login</h1>
      <p class="login-desc">admin.panel / restricted access</p>
      {{if .Error}}<div class="alert-error">{{.Error}}</div>{{end}}
      <form method="POST" action="/admin/login">
        <div class="field">
          <label>Username</label>
          <input type="text" name="username" value="{{.Username}}" autocomplete="username" autofocus required>
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" name="password" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn-submit">Sign in →</button>
      </form>
    </div>
    <p class="login-version">WCP360 v0.0.5 · MIT License</p>
  </div>
</body>
</html>
{{end}}
