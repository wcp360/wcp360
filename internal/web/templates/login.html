{{define "page"}}<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>WCP360 · Sign In</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#050A14;color:#B8CCEB;font-family:system-ui,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:#0A1628;border:1px solid #1A2E52;border-radius:16px;padding:40px;width:100%;max-width:380px}
.logo{text-align:center;margin-bottom:28px}
.logo-mark{color:#4EFFC5;font-size:1.8rem;font-weight:700;font-family:monospace;letter-spacing:-1px}
.logo-sub{color:#4F6488;font-size:.72rem;letter-spacing:.15em;text-transform:uppercase;margin-top:4px}
.form-group{margin-bottom:16px}
label{display:block;font-size:.75rem;text-transform:uppercase;letter-spacing:.08em;color:#4F6488;margin-bottom:6px}
input{width:100%;background:#0D1B30;border:1px solid #1A2E52;color:#B8CCEB;padding:11px 14px;border-radius:8px;font-size:.9rem;font-family:inherit;transition:.15s}
input:focus{outline:none;border-color:#4EFFC5}
button{width:100%;background:#4EFFC5;color:#050A14;padding:11px;border-radius:8px;font-size:.9rem;font-weight:600;cursor:pointer;border:none;font-family:inherit;margin-top:8px;transition:.15s}
button:hover{opacity:.88}
.error{background:rgba(255,93,115,.1);border:1px solid rgba(255,93,115,.3);color:#FF5D73;padding:10px 14px;border-radius:8px;font-size:.82rem;margin-bottom:16px}
.footer{text-align:center;margin-top:20px;font-size:.72rem;color:#4F6488}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-mark">⬡ WCP360</div>
    <div class="logo-sub">Control Panel</div>
  </div>
  {{if .Error}}<div class="error">{{.Error}}</div>{{end}}
  <form method="POST" action="/admin/login">
    <div class="form-group">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" value="{{.Username}}"
             autocomplete="username" required autofocus>
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" name="password"
             autocomplete="current-password" required>
    </div>
    <button type="submit">Sign in →</button>
  </form>
  <div class="footer">WCP360 v0.1.0 · Modern Web Control Panel</div>
</div>
</body>
</html>
{{end}}
