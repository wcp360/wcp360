listen_addr: ":8080"
env: "development"
log_level: "debug"
database_path: "./wcp360.db"
data_dir: "./data/www"

# Generate: openssl rand -hex 32
jwt_secret: "CHANGE_ME_generate_with_openssl_rand_hex_32_xxxxxxxxxxxxxxxx"

admin_email: "admin@example.com"
admin_username: "admin"

# Generate: htpasswd -nbB admin 'yourpassword' | cut -d: -f2
admin_password_hash: "$2b$12$CHANGE_THIS_WITH_A_REAL_BCRYPT_HASH_GENERATED_ABOVE"
